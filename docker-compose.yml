services:
  next:
    build: .
    ports:
      - "3000:3000"
    restart: always
    environment:
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      # 只挂载 db 子目录，持久化 casil.db
      # migrations 目录来自镜像，不会被 volume 覆盖
      - db_data:/app/data/db

volumes:
  db_data:
